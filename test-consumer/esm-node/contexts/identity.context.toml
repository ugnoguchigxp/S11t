schema_version = 1

[context]
id = "consumer:identity"
version = "1.0.0"
owner = "s11t-consumer-test"
source_locale = "ja-JP"
required_locales = ["ja-JP", "en-US"]
output = "text"

[variables.taskGoal]
required = true
type = "string"
trust = "untrusted"
placement = "delimited-context"
encoding = "json-string"

[locales."ja-JP"]
text = "隔離consumer: [[taskGoal]]"

[locales."en-US"]
text = "Isolated consumer: [[taskGoal]]"
