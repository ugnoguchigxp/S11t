schema_version = 2
authoring_version = 2
artifact_version = 3
source_dir = "contexts-v2"
out_dir = ".s11t-v2"

[authoring]
source_locale = "ja-JP"

[governance]
require_owner = true

[keyspaces.consumer]
owner = "consumer"

[release_profiles.development]
required_locales = ["$source", "en-US"]

[variable_profiles."untrusted.text"]
type = "string"
trust = "untrusted"
placement = "delimited-context"
encoding = "json-string"
