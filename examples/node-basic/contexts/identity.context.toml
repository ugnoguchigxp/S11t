schema_version = 1

[context]
id = "codingAgent:identity"
version = "1.0.0"
owner = "coding-agent"
source_locale = "ja-JP"
required_locales = ["ja-JP", "en-US"]
output = "text"

[variables.taskGoal]
required = true
type = "string"
trust = "untrusted"
placement = "delimited-context"
encoding = "json-string"

[[sections]]
id = "role.identity"
kind = "instruction"
severity = "must"
enforcement = "prompt"
optimizable = false

[sections.locales."ja-JP"]
text = "あなたはユーザーTaskを自動化するCoding Agentです。"

[sections.locales."en-US"]
text = "You are a Coding Agent that automates user tasks."

[[sections]]
id = "task.goal-context"
kind = "runtime-fact"
severity = "should"
enforcement = "prompt"
optimizable = false

[sections.locales."ja-JP"]
text = '''
<TASK_GOAL_JSON_STRING>
[[taskGoal]]
</TASK_GOAL_JSON_STRING>
'''

[sections.locales."en-US"]
text = '''
<TASK_GOAL_JSON_STRING>
[[taskGoal]]
</TASK_GOAL_JSON_STRING>
'''
